<!DOCTYPE html>
<html>
    <head>
        <title>wtr_presentation</title>
        <script src = "https://unpkg.com/jspsych@8.0.2"></script>
        <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.0.0"></script>
        <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0"></script>
        <script src="https://unpkg.com/@jspsych/plugin-survey-likert@2.1.0"></script>
        <script src="https://unpkg.com/@jspsych/plugin-html-slider-response@1.1.3"></script>
        <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
        <script src="https://unpkg.com/@jspsych/plugin-survey-multi-choice@1.1.3"></script>
        <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.3"></script>
        <script src="https://unpkg.com/@jspsych/plugin-survey@2.0.0"></script>
        <script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.3"></script>
        
        <script src="./wtr_text.js"></script>
        <link href = "https://unpkg.com/jspsych@8.0.2/css/jspsych.css" rel="stylesheet" type="text/css" />
        <style>
          #jspsych-content {max-width: 90%;}
          .jspsych-survey-likert-opts {max-width: 78%;}
          
          .urn-container {
            background-image: url('gumball_machine.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: none;
            border-radius: 0;
            padding: 0;
            display: inline-block;
            width: 300px;
            height: 450px;
            position: relative;
          }
          
          .urn-balls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;  /* Centers all balls */
            align-content: flex-start;
            gap: 5px;
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            padding: 10px;
            z-index: 1;
          }
          
          .urn-ball {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #333;
          }
          
          .ball-legend {
            display: inline-block;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid #333;
            vertical-align: middle;
            margin-right: 8px;
          }
        </style>
</head>
<body>
    <div id="jspsych-target"></div>
    <script src="./wtr_presentation.js"></script>
  </body>  
</html>
